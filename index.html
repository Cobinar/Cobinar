<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
:root{
  --font-display:'Unbounded',sans-serif;
  --font-ui:'Plus Jakarta Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --tr:.22s cubic-bezier(.4,0,.2,1);
  --r:16px; --r-sm:10px; --r-xs:8px;
  --header-h:58px;
}

/* ── THEMES ── */
[data-theme="sky"]{
  --bga:#5ba8e0;--bgb:#89c8f7;--bgc:#c4e6ff;--bgd:#f0f9ff;
  --panel:rgba(255,255,255,0.82);--pblur:blur(28px) saturate(200%);
  --hbg:rgba(255,255,255,0.88);--hblur:blur(22px) saturate(180%);
  --border:rgba(110,185,255,0.32);--bfocus:rgba(26,133,255,0.52);
  --text:#0c2840;--sub:#2e5878;--muted:#6a9fc0;
  --accent:#1a85ff;--asoft:rgba(26,133,255,0.10);--a2:#ff6060;
  --shadow:0 8px 40px rgba(20,90,200,0.10),0 2px 8px rgba(0,70,200,0.06);
  --smenu:0 20px 60px rgba(0,70,180,0.16),0 4px 16px rgba(0,50,140,0.08);
  --glow:rgba(26,133,255,0.28);--dot:#22c55e;
  --sep:rgba(110,185,255,0.28);--sel:rgba(26,133,255,0.18);
  --tc:#89c8f7;--metac:#a8d8ff;
}
[data-theme="sakura"]{
  --bga:#ffc8e0;--bgb:#ffe0f0;--bgc:#fff0f8;--bgd:#fffafd;
  --panel:rgba(255,255,255,0.84);--pblur:blur(28px) saturate(200%);
  --hbg:rgba(255,246,252,0.92);--hblur:blur(22px) saturate(180%);
  --border:rgba(240,100,170,0.27);--bfocus:rgba(220,60,140,0.52);
  --text:#280818;--sub:#802848;--muted:#c07090;
  --accent:#e03070;--asoft:rgba(224,48,112,0.09);--a2:#ff8830;
  --shadow:0 8px 40px rgba(190,50,110,0.10),0 2px 8px rgba(170,34,90,0.06);
  --smenu:0 20px 60px rgba(170,44,100,0.13);
  --glow:rgba(224,48,112,0.26);--dot:#e03070;
  --sep:rgba(240,100,170,0.26);--sel:rgba(224,48,112,0.16);
  --tc:#ffc8e0;--metac:#ffb8d8;
}
[data-theme="mint"]{
  --bga:#a0e8c0;--bgb:#c8f5dc;--bgc:#e8faf0;--bgd:#f5fffa;
  --panel:rgba(255,255,255,0.82);--pblur:blur(28px) saturate(200%);
  --hbg:rgba(248,255,252,0.92);--hblur:blur(22px) saturate(180%);
  --border:rgba(0,180,100,0.24);--bfocus:rgba(0,170,90,0.50);
  --text:#062018;--sub:#1a6040;--muted:#5aaa7a;
  --accent:#00b060;--asoft:rgba(0,176,96,0.09);--a2:#0090d0;
  --shadow:0 8px 40px rgba(0,100,60,0.09),0 2px 8px rgba(0,80,40,0.06);
  --smenu:0 20px 60px rgba(0,90,50,0.13);
  --glow:rgba(0,176,96,0.26);--dot:#00b060;
  --sep:rgba(0,180,100,0.22);--sel:rgba(0,176,96,0.16);
  --tc:#a0e8c0;--metac:#90ddb0;
}

/* ── BODY ── */
body{
  font-family:var(--font-ui);color:var(--text);
  background:linear-gradient(155deg,var(--bga) 0%,var(--bgb) 25%,var(--bgc) 65%,var(--bgd) 100%) fixed;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background var(--tr),color var(--tr);
}
::selection{background:var(--sel);}

/* Soft floating blobs */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.blob{
  position:absolute;border-radius:50%;
  filter:blur(80px);opacity:.45;
  animation:blobFloat linear infinite alternate;
}
@keyframes blobFloat{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(var(--dx,20px),var(--dy,30px)) scale(var(--ds,1.08));}
}

/* Dot grid */
.dot-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(rgba(0,0,0,0.06) 1px,transparent 1px);
  background-size:28px 28px;
}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--header-h);
  background:var(--hbg);
  backdrop-filter:var(--hblur);-webkit-backdrop-filter:var(--hblur);
  border-bottom:1px solid transparent;
  display:flex;align-items:center;gap:10px;padding:0 28px;
  transition:border-color var(--tr),background var(--tr),box-shadow var(--tr);
}
.nav.scrolled{
  border-color:var(--border);
  box-shadow:var(--shadow);
}
.nav-logo{
  font-family:var(--font-display);font-weight:900;
  font-size:clamp(.85rem,.9rem,1rem);letter-spacing:-.03em;
  color:var(--text);text-decoration:none;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.logo-pip{
  width:9px;height:9px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 12px var(--glow);
  animation:pip 2.8s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes pip{
  0%,100%{box-shadow:0 0 12px var(--glow),0 0 24px var(--asoft);}
  50%{box-shadow:0 0 4px var(--glow);}
}
.nav-links{display:flex;gap:4px;list-style:none;margin-left:16px;}
.nav-links a{
  font-size:.72rem;font-weight:600;letter-spacing:.04em;
  color:var(--sub);text-decoration:none;
  padding:6px 12px;border-radius:var(--r-xs);
  transition:all var(--tr);
}
.nav-links a:hover{background:var(--asoft);color:var(--accent);}
.h-space{flex:1;}

/* Theme switcher pills */
.theme-switcher{display:flex;gap:6px;align-items:center;}
.t-pill{
  width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;
  transition:transform var(--tr),border-color var(--tr),box-shadow var(--tr);
}
.t-pill:hover{transform:scale(1.18);}
.t-pill.active{border-color:var(--text);box-shadow:0 0 0 2px var(--panel);}

.nav-cta{
  font-family:var(--font-ui);font-size:.72rem;font-weight:700;
  letter-spacing:.04em;color:#fff;
  background:var(--accent);
  padding:9px 20px;border-radius:99px;text-decoration:none;
  box-shadow:0 2px 12px var(--glow);
  transition:box-shadow var(--tr),transform var(--tr),filter var(--tr);
  flex-shrink:0;
}
.nav-cta:hover{box-shadow:0 4px 22px var(--glow);transform:translateY(-1px);filter:brightness(1.06);}

/* Hamburger */
.nav-ham{
  display:none;flex-direction:column;gap:5px;cursor:pointer;
  padding:6px;background:none;border:none;color:var(--sub);
}
.nav-ham span{
  display:block;width:20px;height:2px;border-radius:2px;
  background:currentColor;transition:all var(--tr);
}

/* Mobile nav drawer */
.nav-drawer{
  display:none;position:fixed;top:var(--header-h);left:0;right:0;z-index:190;
  background:var(--hbg);backdrop-filter:var(--hblur);-webkit-backdrop-filter:var(--hblur);
  border-bottom:1px solid var(--border);
  flex-direction:column;gap:4px;padding:12px 20px 20px;
  animation:drawerIn .2s ease forwards;
}
.nav-drawer.open{display:flex;}
@keyframes drawerIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.nav-drawer a{
  font-size:.85rem;font-weight:600;color:var(--sub);text-decoration:none;
  padding:11px 14px;border-radius:var(--r-sm);
  transition:all var(--tr);
}
.nav-drawer a:hover{background:var(--asoft);color:var(--accent);}

/* ── HERO ── */
.hero{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  text-align:center;
  padding:calc(var(--header-h) + 60px) 28px 80px;
}

.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  font-family:var(--font-mono);font-size:.65rem;font-weight:500;
  color:var(--sub);
  background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);
  border:1px solid var(--border);border-radius:99px;
  padding:6px 16px;margin-bottom:28px;
  box-shadow:var(--shadow);
  opacity:0;animation:rU .8s cubic-bezier(.22,1,.36,1) .1s forwards;
}
.badge-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--dot);box-shadow:0 0 8px var(--dot);
  animation:livepulse 2s ease-in-out infinite;
}
@keyframes livepulse{0%,100%{opacity:1;}50%{opacity:.35;}}

.hero-title{
  font-family:var(--font-display);font-weight:900;
  font-size:clamp(3.8rem,13vw,10rem);
  letter-spacing:-.05em;line-height:.88;
  color:var(--text);
  opacity:0;animation:rU 1s cubic-bezier(.22,1,.36,1) .28s forwards;
  margin-bottom:6px;
}
.hero-title .ht-accent{color:var(--accent);}

.hero-tagline{
  font-family:var(--font-ui);font-weight:600;
  font-size:clamp(.95rem,2.2vw,1.5rem);
  color:var(--sub);letter-spacing:-.01em;
  opacity:0;animation:rU .9s cubic-bezier(.22,1,.36,1) .46s forwards;
  margin-bottom:14px;
}

.hero-founder{
  font-family:var(--font-mono);font-size:.65rem;font-weight:400;
  color:var(--muted);letter-spacing:.1em;
  opacity:0;animation:rU .9s cubic-bezier(.22,1,.36,1) .58s forwards;
  margin-bottom:32px;
}
.hero-founder em{color:var(--sub);font-style:normal;font-weight:500;}

.hero-sub{
  font-size:.9rem;font-weight:400;color:var(--muted);line-height:1.75;
  max-width:400px;
  opacity:0;animation:rU .9s cubic-bezier(.22,1,.36,1) .7s forwards;
  margin-bottom:44px;
}

.hero-actions{
  display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;
  opacity:0;animation:rU .9s cubic-bezier(.22,1,.36,1) .84s forwards;
}

.btn-primary{
  font-family:var(--font-ui);font-size:.78rem;font-weight:700;letter-spacing:.03em;
  color:#fff;background:var(--accent);
  padding:14px 32px;border-radius:99px;text-decoration:none;
  box-shadow:0 4px 20px var(--glow);
  transition:box-shadow var(--tr),transform var(--tr),filter var(--tr);
}
.btn-primary:hover{box-shadow:0 6px 32px var(--glow);transform:translateY(-2px);filter:brightness(1.07);}

.btn-ghost{
  font-family:var(--font-ui);font-size:.78rem;font-weight:600;letter-spacing:.03em;
  color:var(--sub);
  background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);
  border:1px solid var(--border);
  padding:14px 32px;border-radius:99px;text-decoration:none;
  box-shadow:var(--shadow);
  transition:all var(--tr);
}
.btn-ghost:hover{border-color:var(--bfocus);color:var(--accent);transform:translateY(-2px);}

.scroll-hint{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;animation:fi 1s ease 1.8s forwards;
}
.scroll-hint span{
  font-family:var(--font-mono);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);
}
.scroll-needle{
  width:1.5px;height:44px;
  background:linear-gradient(to bottom,transparent,var(--accent));
  border-radius:2px;
  animation:np 2.2s ease infinite;
}
@keyframes np{0%,100%{opacity:.3;transform:scaleY(1);}50%{opacity:1;transform:scaleY(1.1);}}

/* ── STATS STRIP ── */
.stats-strip{
  position:relative;z-index:1;
  background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
}
.stats-inner{
  max-width:1100px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);
}
.stat-item{
  padding:28px 20px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  border-right:1px solid var(--border);
  transition:background var(--tr);
}
.stat-item:last-child{border-right:none;}
.stat-item:hover{background:var(--asoft);}
.stat-emoji{font-size:1.2rem;margin-bottom:6px;}
.stat-val{
  font-family:var(--font-display);font-weight:900;
  font-size:1.6rem;letter-spacing:-.04em;color:var(--text);
}
.stat-lbl{
  font-family:var(--font-mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);
}

/* ── SECTION ── */
.section{
  position:relative;z-index:1;
  max-width:1100px;margin:0 auto;
  padding:72px 28px 100px;
}
.sec-hd{display:flex;align-items:center;gap:14px;margin-bottom:48px;}
.sec-pip{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 10px var(--glow);
  flex-shrink:0;
}
.sec-idx{
  font-family:var(--font-mono);font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;
  color:var(--muted);
}
.sec-ttl{
  font-family:var(--font-display);font-weight:800;
  font-size:clamp(1.6rem,3.5vw,2.4rem);letter-spacing:-.04em;
  color:var(--text);
}

/* ── PRODUCT GRID ──  auto-layout based on count */
.pgrid{
  display:grid;
  gap:12px;
  grid-template-columns:repeat(auto-fill, minmax(min(100%, 260px), 1fr));
}

/* ── PRODUCT CARD ── */
.pcard{
  position:relative;overflow:hidden;
  background:var(--panel);
  backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);
  border:1px solid var(--border);border-radius:20px;
  padding:28px;min-height:260px;
  display:flex;flex-direction:column;justify-content:space-between;
  text-decoration:none;color:inherit;cursor:pointer;
  transition:
    border-color var(--tr),
    box-shadow var(--tr),
    transform .35s cubic-bezier(.22,1,.36,1),
    background var(--tr);
}
.pcard::after{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(circle at top left, var(--ca,transparent), transparent 55%);
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.pcard:hover{
  border-color:var(--bfocus);
  box-shadow:var(--smenu);
  transform:translateY(-5px);
}
.pcard:hover::after{opacity:1;}

/* Featured card: spans 2 cols */
.pcard.feat{grid-column:span 2;}

/* Card top */
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.pc-badge{
  font-family:var(--font-mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);background:var(--asoft);
  border:1px solid var(--border);
  padding:4px 11px;border-radius:99px;
}
.pc-emoji{font-size:1.3rem;line-height:1;}
.pc-arr{
  font-size:.95rem;color:var(--muted);
  transition:transform .3s cubic-bezier(.22,1,.36,1),color var(--tr);
}
.pcard:hover .pc-arr{transform:translate(4px,-4px);color:var(--accent);}

/* Card body */
.pc-name{
  font-family:var(--font-display);font-weight:800;
  font-size:clamp(1.8rem,4vw,2.4rem);letter-spacing:-.05em;line-height:1;
  margin-bottom:10px;
  transition:color var(--tr);
}
.pc-desc{font-size:.83rem;font-weight:400;color:var(--muted);line-height:1.7;}

/* Card footer */
.pc-foot{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-top:24px;padding-top:14px;
  border-top:1px solid var(--sep);
}
.pc-tag{font-family:var(--font-mono);font-size:.56rem;letter-spacing:.12em;color:var(--muted);}
.pc-url{
  font-family:var(--font-mono);font-size:.56rem;letter-spacing:.05em;color:var(--muted);
  opacity:0;transition:opacity .3s;
}
.pcard:hover .pc-url{opacity:1;}

/* Accent bottom bar */
.pc-bar{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(to right,var(--ac,transparent),transparent);
  opacity:0;transition:opacity .4s;border-radius:0 0 20px 20px;
}
.pcard:hover .pc-bar{opacity:1;}

/* ── SCREENSHOT PREVIEW ── */
.ss-wrap{
  position:absolute;bottom:0;left:0;right:0;
  height:52%;
  border-radius:0 0 20px 20px;
  overflow:hidden;
  clip-path:inset(100% 0 0 0);
  transition:clip-path .55s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
}
.pcard:hover .ss-wrap{clip-path:inset(0% 0 0 0);}
.ss-fade{
  position:absolute;inset:0;top:-1px;z-index:2;
  background:linear-gradient(to bottom, var(--panel) 0%, rgba(255,255,255,.1) 50%, transparent 100%);
  pointer-events:none;
}
.ss-img{
  width:100%;height:100%;object-fit:cover;object-position:top;
  display:block;opacity:0;
  filter:saturate(.9) brightness(1.05);
  transition:opacity .4s ease .1s;
}
.ss-img.loaded{opacity:1;}
.ss-skeleton{
  position:absolute;inset:0;z-index:1;
  background:var(--asoft);
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:opacity .3s;
}
.ss-skeleton.hide{opacity:0;pointer-events:none;}
.sk-dot{
  width:5px;height:5px;border-radius:50%;background:var(--border);
  animation:skp 1.1s ease infinite;
}
.sk-dot:nth-child(2){animation-delay:.18s;}
.sk-dot:nth-child(3){animation-delay:.36s;}
@keyframes skp{0%,100%{opacity:.3;transform:scale(.7);}50%{opacity:1;transform:scale(1.3);}}

/* ── FEATURES ── */
.feat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));
  gap:12px;
}
.feat-card{
  background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);
  border:1px solid var(--border);border-radius:20px;padding:28px;
  transition:border-color var(--tr),box-shadow var(--tr),transform var(--tr);
}
.feat-card:hover{border-color:var(--bfocus);box-shadow:var(--shadow);transform:translateY(-3px);}
.feat-em{font-size:1.6rem;margin-bottom:16px;display:block;}
.feat-ttl{
  font-family:var(--font-display);font-weight:800;font-size:.95rem;
  letter-spacing:-.03em;color:var(--text);margin-bottom:8px;
}
.feat-body{font-size:.8rem;font-weight:400;color:var(--muted);line-height:1.75;}

/* ── DIVIDER ── */
.divider{
  position:relative;z-index:1;height:1px;
  background:linear-gradient(to right,transparent,var(--border) 25%,var(--border) 75%,transparent);
}

/* ── FOOTER ── */
.footer{
  position:relative;z-index:1;
  background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);
  border-top:1px solid var(--border);
}
.footer-inner{
  max-width:1100px;margin:0 auto;
  padding:48px 28px 36px;
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;
}
.f-brand-name{
  font-family:var(--font-display);font-weight:900;font-size:1.15rem;
  letter-spacing:-.04em;color:var(--text);margin-bottom:10px;
}
.f-brand-name .fa{color:var(--accent);}
.f-desc{font-size:.8rem;font-weight:400;color:var(--muted);line-height:1.75;max-width:220px;margin-bottom:16px;}
.f-founder{
  font-family:var(--font-mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);line-height:2;
}
.f-founder strong{color:var(--sub);font-weight:500;}
.f-col-ttl{
  font-family:var(--font-mono);font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);margin-bottom:16px;
}
.f-col ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.f-col a{font-size:.82rem;font-weight:500;color:var(--sub);text-decoration:none;transition:color var(--tr);}
.f-col a:hover{color:var(--accent);}
.footer-bottom{
  max-width:1100px;margin:0 auto;
  padding:20px 28px 28px;
  display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid var(--sep);
}
.f-copy{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.f-legal{display:flex;gap:20px;}
.f-legal a{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color var(--tr);}
.f-legal a:hover{color:var(--sub);}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);z-index:9999;
  background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);
  border:1px solid var(--bfocus);border-radius:99px;
  font-family:var(--font-mono);font-size:.7rem;font-weight:500;color:var(--accent);
  padding:8px 20px;
  opacity:0;pointer-events:none;
  box-shadow:var(--smenu);white-space:nowrap;
  transition:opacity .2s,transform .2s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── REVEAL ── */
.reveal{
  opacity:0;transform:translateY(22px);
  transition:opacity .75s cubic-bezier(.22,1,.36,1),transform .75s cubic-bezier(.22,1,.36,1);
}
.reveal.visible{opacity:1;transform:translateY(0);}

/* ── KEYFRAMES ── */
@keyframes rU{from{opacity:0;transform:translateY(26px);}to{opacity:1;transform:translateY(0);}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}

/* ── RESPONSIVE ── */

/* Tablet: 2-col grid, simpler footer */
@media(max-width:900px){
  .pcard.feat{grid-column:span 1;}
  .footer-inner{grid-template-columns:1fr 1fr;gap:28px;}
}

/* Mobile: single col, hamburger nav */
@media(max-width:640px){
  .nav-links{display:none;}
  .theme-switcher{display:none;}
  .nav-cta{display:none;}
  .nav-ham{display:flex;}

  .hero-title{font-size:clamp(3rem,17vw,5rem);}
  .hero-actions{flex-direction:column;width:100%;}
  .btn-primary,.btn-ghost{text-align:center;width:100%;}

  .stats-inner{grid-template-columns:repeat(2,1fr);}
  .stat-item:nth-child(2n){border-right:none;}
  .stat-item{border-bottom:1px solid var(--border);}

  .pgrid{grid-template-columns:1fr;}
  .feat-grid{grid-template-columns:1fr;}

  .footer-inner{grid-template-columns:1fr;}
  .footer-bottom{flex-direction:column;gap:12px;text-align:center;}

  /* Disable screenshots on low-perf mobile */
  .ss-wrap{display:none;}
}

/* Very small */
@media(max-width:380px){
  .hero-title{font-size:3rem;}
  .section{padding:52px 18px 72px;}
}

<!-- BOOTSTRAP -->
<script>
(function(){
  const C = COBINAR_CONFIG, B = C.brand;
  const $ = id => document.getElementById(id);
  function host(u){try{return new URL(u).hostname;}catch{return u;}}
  function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)].join(',');}

  /* ── Apply theme ── */
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    const mc={'sky':'#a8d8ff','sakura':'#ffb8d8','mint':'#90ddb0'};
    $('metaTheme')&&($('metaTheme').content=mc[t]||mc.sky);
    document.querySelectorAll('.t-pill').forEach(p=>{
      p.classList.toggle('active',p.dataset.t===t);
    });
    localStorage.setItem('cobinar-theme',t);
  }

  /* ── PWA Manifest ── */
  try{
    const m=C.pwa;
    const blob=new Blob([JSON.stringify({name:m.name,short_name:m.name,description:m.description,theme_color:m.theme_color,background_color:m.background_color,display:m.display,start_url:m.start_url,icons:[{src:'icons/icon-192.png',sizes:'192x192',type:'image/png'},{src:'icons/icon-512.png',sizes:'512x512',type:'image/png'}]})],{type:'application/manifest+json'});
    const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(blob);document.head.appendChild(l);
  }catch(e){}

  /* ── Nav ── */
  $('navLogo').innerHTML='<div class="logo-pip"></div>'+B.name;
  (C.nav||[]).forEach(l=>{
    const li=document.createElement('li');
    li.innerHTML=`<a href="${l.href}">${l.label}</a>`;
    $('navLinks').appendChild(li);
    // drawer
    const a=document.createElement('a');a.href=l.href;a.textContent=l.label;
    $('navDrawer').appendChild(a);
  });
  if(C.cta?.primary){$('navCta').textContent=C.cta.primary.label;$('navCta').href=C.cta.primary.href;}

  /* ── Theme switcher ── */
  const themes=[{id:'sky',bg:'#5ba8e0',label:'Sky'},{id:'sakura',bg:'#ffc8e0',label:'Sakura'},{id:'mint',bg:'#a0e8c0',label:'Mint'}];
  const sw=$('themeSwitcher');
  themes.forEach(t=>{
    const b=document.createElement('button');
    b.className='t-pill';b.title=t.label;b.dataset.t=t.id;
    b.style.background=t.bg;
    b.addEventListener('click',()=>applyTheme(t.id));
    sw.appendChild(b);
  });

  /* Load saved or default theme */
  applyTheme(localStorage.getItem('cobinar-theme')||C.defaultTheme||'sky');

  /* ── Hamburger ── */
  let drawerOpen=false;
  $('navHam').addEventListener('click',()=>{
    drawerOpen=!drawerOpen;
    $('navDrawer').classList.toggle('open',drawerOpen);
  });
  $('navDrawer').querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{
    drawerOpen=false;$('navDrawer').classList.remove('open');
  }));

  /* ── Hero ── */
  $('heroBadge').textContent = B.org+' — Live';
  $('heroTitle').innerHTML = B.name.slice(0,-2)+'<span class="ht-accent">'+B.name.slice(-2)+'</span>';
  $('heroTagline').textContent = B.tagline;
  $('heroFounder').innerHTML = 'Founded by <em>'+B.founder+'</em>';
  $('heroSub').textContent = B.subtitle||'';
  if(C.cta?.primary)  $('heroCta').innerHTML+=`<a href="${C.cta.primary.href}"   class="btn-primary">${C.cta.primary.label}</a>`;
  if(C.cta?.secondary)$('heroCta').innerHTML+=`<a href="${C.cta.secondary.href}" class="btn-ghost">${C.cta.secondary.label}</a>`;

  /* ── Stats ── */
  (C.stats||[]).forEach(s=>{
    const d=document.createElement('div');d.className='stat-item reveal';
    d.innerHTML=`<span class="stat-emoji">${s.emoji||''}</span><span class="stat-val">${s.value}</span><span class="stat-lbl">${s.label}</span>`;
    $('statsGrid').appendChild(d);
  });

  /* ── Products ── */
  const isMobile=window.innerWidth<=640;
  const grid=$('productsGrid');
  C.products.forEach(p=>{
    const rgb=hexRgb(p.accent);
    const isFeat=p.featured&&window.innerWidth>640;
    const card=document.createElement('a');
    card.href=p.url;card.target='_blank';card.rel='noopener noreferrer';
    card.className='pcard reveal'+(isFeat?' feat':'');
    card.style.cssText=`--ca:rgba(${rgb},.08);--ac:${p.accent};`;
    card.innerHTML=`
      <div>
        <div class="pc-top">
          <span class="pc-badge">${p.category}</span>
          <span class="pc-emoji">${p.emoji||'✦'}</span>
          <span class="pc-arr" aria-hidden="true">↗</span>
        </div>
        <h3 class="pc-name" style="color:${p.accent}">${p.name}</h3>
        <p class="pc-desc">${p.description}</p>
      </div>
      <div class="pc-foot">
        <span class="pc-tag">${p.tag||''}</span>
        <span class="pc-url">${host(p.url)}</span>
      </div>
      <div class="pc-bar"></div>
      <div class="ss-wrap" data-state="idle">
        <div class="ss-fade"></div>
        <div class="ss-skeleton">
          <div class="sk-dot"></div><div class="sk-dot"></div><div class="sk-dot"></div>
        </div>
        <img class="ss-img" src="" alt="Live preview — ${p.name}" loading="lazy"/>
      </div>`;
    grid.appendChild(card);

    /* Screenshot on hover */
    if(!isMobile){
      let t=null;
      card.addEventListener('mouseenter',()=>{
        const ss=card.querySelector('.ss-wrap');
        if(!ss||ss.dataset.state!=='idle')return;
        t=setTimeout(()=>{
          ss.dataset.state='loading';
          const img=ss.querySelector('.ss-img'),sk=ss.querySelector('.ss-skeleton');
          img.src=`https://api.microlink.io/?url=${encodeURIComponent(p.url)}&screenshot=true&meta=false&embed=screenshot.url`;
          img.onload=()=>{img.classList.add('loaded');sk.classList.add('hide');ss.dataset.state='done';};
          img.onerror=()=>{sk.classList.add('hide');ss.dataset.state='error';};
        },320);
      });
      card.addEventListener('mouseleave',()=>clearTimeout(t));
    }
  });

  /* ── Features ── */
  [
    {em:'◈',ttl:'Neo-Minimalist Design',    body:'Geometric precision and glassmorphic depth — beauty is an architectural constraint, not an afterthought.'},
    {em:'🌐',ttl:'Multilingual by Default', body:'24 languages natively — from Haitian Creole to Mandarin — treated as a first-class feature, not a checkbox.'},
    {em:'⚡',ttl:'PWA-Grade Performance',   body:'Installable, offline-capable, and app-fast. Progressive Web App standards are the baseline, not a bonus.'},
    {em:'✦',ttl:'Unified Ecosystem',        body:'One design identity, one standard of quality across every product in the Cobernal umbrella.'},
    {em:'◎',ttl:'Developer-First',          body:'Complete API docs, SDKs, and integration guides. Build on top of Cobinar with confidence.'},
    {em:'♡',ttl:'Built with Intention',     body:'One developer, one vision. No committee design, no corporate bloat — every decision is deliberate.'},
  ].forEach(f=>{
    const d=document.createElement('div');d.className='feat-card reveal';
    d.innerHTML=`<span class="feat-em">${f.em}</span><h3 class="feat-ttl">${f.ttl}</h3><p class="feat-body">${f.body}</p>`;
    $('featGrid').appendChild(d);
  });

  /* ── Footer ── */
  $('footerTop').innerHTML=`
    <div>
      <div class="f-brand-name">${B.name.slice(0,-2)}<span class="fa">${B.name.slice(-2)}</span></div>
      <p class="f-desc">${B.subtitle}</p>
      <div class="f-founder">Founded by<br><strong>${B.founder}</strong><br>${B.org}</div>
    </div>
    <div class="f-col">
      <p class="f-col-ttl">Platform</p>
      <ul>${C.products.map(p=>`<li><a href="${p.url}" target="_blank" rel="noopener">${p.name}</a></li>`).join('')}</ul>
    </div>
    <div class="f-col">
      <p class="f-col-ttl">Company</p>
      <ul>
        <li><a href="about.html">About</a></li>
        <li><a href="https://blog.cobinar.com">Blog</a></li>
        <li><a href="https://docs.cobinar.com">Docs</a></li>
        <li><a href="https://help.cobinar.com">Help</a></li>
      </ul>
    </div>
    <div class="f-col">
      <p class="f-col-ttl">Legal</p>
      <ul>
        <li><a href="privacy.html">Privacy</a></li>
        <li><a href="terms.html">Terms</a></li>
        <li><a href="cookies.html">Cookies</a></li>
      </ul>
    </div>`;
  $('fCopy').textContent='© '+(B.copyright||new Date().getFullYear())+' '+B.org+'. All rights reserved.';
  [{l:'Privacy',h:'privacy.html'},{l:'Terms',h:'terms.html'},{l:'About',h:'about.html'}].forEach(x=>{
    const a=document.createElement('a');a.href=x.h;a.textContent=x.l;$('fLegal').appendChild(a);
  });

  /* ── Nav scroll effect ── */
  const nav=$('nav');
  window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>30),{passive:true});

  /* ── Reveal ── */
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      setTimeout(()=>e.target.classList.add('visible'),Number(e.target.dataset.d||0));
      io.unobserve(e.target);
    });
  },{threshold:.08});
  document.querySelectorAll('.reveal').forEach((el,i)=>{el.dataset.d=i*70;io.observe(el);});

  /* ── Toast ── */
  const toast=$('toast');let toastT;
  function showToast(m,d=2200){
    toast.textContent=m;toast.classList.add('show');
    clearTimeout(toastT);toastT=setTimeout(()=>toast.classList.remove('show'),d);
  }
  setTimeout(()=>showToast('✦ Welcome to Cobinar'),600);

  /* ── Document meta ── */
  document.title=B.name+' — '+B.tagline;
})();
</script>
