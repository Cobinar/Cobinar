body{font-family:var(--font-ui);color:var(--text);background:linear-gradient(158deg,var(--bga) 0%,var(--bgb) 22%,var(--bgc) 60%,var(--bgd) 100%) fixed;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .5s,color var(--tr);}
::selection{background:var(--sel);}

.parallax-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.plx-orb{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform;}
.dot-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(var(--dg,rgba(0,0,0,0.042)) 1px,transparent 1px);background-size:30px 30px;}

#progressBar{position:fixed;top:0;left:0;height:2px;z-index:999;background:var(--accent);box-shadow:0 0 8px var(--glow);width:0%;border-radius:0 1px 1px 0;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--header-h);background:var(--hbg);backdrop-filter:var(--hblur);-webkit-backdrop-filter:var(--hblur);border-bottom:1px solid transparent;display:flex;align-items:center;gap:10px;padding:0 20px;transition:border-color var(--tr),box-shadow var(--tr);}
.nav.scrolled{border-color:var(--border);box-shadow:var(--shadow);}
.nav-logo{font-family:var(--font-display);font-weight:900;font-size:.88rem;letter-spacing:-.03em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-pip{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--glow);animation:pip 2.8s ease-in-out infinite;flex-shrink:0;}
@keyframes pip{0%,100%{box-shadow:0 0 12px var(--glow),0 0 24px var(--asoft);}50%{box-shadow:0 0 4px var(--glow);}}
.nav-links{display:flex;gap:4px;list-style:none;margin-left:12px;}
.nav-links a{font-size:.72rem;font-weight:600;letter-spacing:.04em;color:var(--sub);text-decoration:none;padding:6px 12px;border-radius:8px;transition:all var(--tr);}
.nav-links a:hover{background:var(--asoft);color:var(--accent);}
.h-space{flex:1;}
.nav-controls{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.theme-switcher{display:flex;gap:6px;}
.t-pill{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform var(--tr),border-color var(--tr);}
.t-pill:hover{transform:scale(1.2);}
.t-pill.active{border-color:var(--text);}

/* LANG BUTTON + DROPDOWN */
.lang-btn{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.62rem;font-weight:500;letter-spacing:.06em;color:var(--sub);background:var(--panel);backdrop-filter:var(--pblur);border:1px solid var(--border);border-radius:99px;padding:6px 11px;cursor:pointer;transition:all var(--tr);white-space:nowrap;}
.lang-btn:hover{border-color:var(--bfocus);color:var(--accent);}
.lang-caret{font-size:.48rem;opacity:.55;transition:transform var(--tr);}
.lang-btn[aria-expanded="true"] .lang-caret{transform:rotate(180deg);}
.lang-dropdown{position:fixed;top:calc(var(--header-h) + 6px);right:20px;background:var(--panel);backdrop-filter:blur(32px) saturate(220%);-webkit-backdrop-filter:blur(32px) saturate(220%);border:1px solid var(--border);border-radius:18px;padding:8px;box-shadow:var(--smenu);display:none;z-index:400;min-width:190px;}

.lang-opt .lo-check{font-size:.65rem;color:var(--accent);opacity:0;}

.nav-cta{font-size:.72rem;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--accent);padding:9px 18px;border-radius:99px;text-decoration:none;box-shadow:0 2px 12px var(--glow);transition:box-shadow var(--tr),transform var(--tr),filter var(--tr);}
.nav-cta:hover{box-shadow:0 5px 24px var(--glow);transform:translateY(-1px);filter:brightness(1.07);}
.nav-ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;color:var(--sub);}
.nav-ham span{display:block;width:20px;height:2px;border-radius:2px;background:currentColor;}
.nav-drawer{display:none;position:fixed;top:var(--header-h);left:0;right:0;z-index:290;background:var(--hbg);backdrop-filter:var(--hblur);-webkit-backdrop-filter:var(--hblur);border-bottom:1px solid var(--border);flex-direction:column;gap:4px;padding:12px 20px 20px;}
.nav-drawer.open{display:flex;animation:drawerIn .2s var(--ease-spring) forwards;}
@keyframes drawerIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.nav-drawer a{font-size:.85rem;font-weight:600;color:var(--sub);text-decoration:none;padding:11px 14px;border-radius:10px;transition:all var(--tr);}
.nav-drawer a:hover{background:var(--asoft);color:var(--accent);}

/* HERO */
.hero{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:calc(var(--header-h)+60px) 28px 80px;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:var(--hero-grad);pointer-events:none;transition:background .5s;}

.hero-badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:.65rem;color:var(--sub);background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);border:1px solid var(--border);border-radius:99px;padding:6px 16px;margin-bottom:28px;box-shadow:var(--shadow);opacity:0;animation:heroUp .8s var(--ease-spring) .1s forwards;position:relative;z-index:1;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--dot);box-shadow:0 0 8px var(--dot);animation:livepulse 2s ease-in-out infinite;}
@keyframes livepulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.hero-title{font-family:var(--font-display);font-weight:900;font-size:clamp(3.8rem,13vw,10rem);letter-spacing:-.05em;line-height:.88;color:var(--text);margin-bottom:8px;opacity:0;animation:heroUp 1.1s var(--ease-spring) .28s forwards;position:relative;z-index:1;will-change:transform;}
.ht-accent{color:var(--accent);}
.ht-word{display:inline-block;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 50%,var(--text) 100%);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s ease 2s infinite;}
@keyframes shimmer{0%,100%{background-position:100% 0;}50%{background-position:0% 0;}}
.hero-tagline{font-weight:600;font-size:clamp(.95rem,2.2vw,1.5rem);color:var(--sub);letter-spacing:-.01em;margin-bottom:14px;opacity:0;animation:heroUp .9s var(--ease-spring) .46s forwards;position:relative;z-index:1;}
.hero-founder{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);letter-spacing:.1em;margin-bottom:32px;opacity:0;animation:heroUp .9s var(--ease-spring) .58s forwards;position:relative;z-index:1;}
.hero-founder em{color:var(--sub);font-style:normal;font-weight:500;}
.hero-sub{font-size:.9rem;color:var(--muted);line-height:1.75;max-width:400px;margin-bottom:44px;opacity:0;animation:heroUp .9s var(--ease-spring) .7s forwards;position:relative;z-index:1;}
.hero-actions{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;opacity:0;animation:heroUp .9s var(--ease-spring) .84s forwards;position:relative;z-index:1;}
@keyframes heroUp{from{opacity:0;transform:translateY(28px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.btn-primary{font-size:.78rem;font-weight:700;letter-spacing:.03em;color:#fff;background:var(--accent);padding:14px 32px;border-radius:99px;text-decoration:none;box-shadow:0 4px 24px var(--glow);transition:box-shadow var(--tr),transform var(--tr),filter var(--tr);position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;inset:-1px;border-radius:99px;background:linear-gradient(135deg,rgba(255,255,255,0.25),transparent 50%);pointer-events:none;}
.btn-primary:hover{box-shadow:0 8px 36px var(--glow);transform:translateY(-2px) scale(1.02);filter:brightness(1.08);}
.btn-ghost{font-size:.78rem;font-weight:600;letter-spacing:.03em;color:var(--sub);background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);border:1px solid var(--border);padding:14px 32px;border-radius:99px;text-decoration:none;box-shadow:var(--shadow);transition:all var(--tr);}
.btn-ghost:hover{border-color:var(--bfocus);color:var(--accent);transform:translateY(-2px);}
.scroll-hint{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fi 1s ease 2s forwards;z-index:1;}
.scroll-hint span{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.scroll-needle{width:1.5px;height:44px;background:linear-gradient(to bottom,transparent,var(--accent));border-radius:2px;animation:np 2.2s ease infinite;}
@keyframes np{0%,100%{opacity:.3;transform:scaleY(1);}50%{opacity:1;transform:scaleY(1.1) translateY(4px);}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}

/* STATS */
.stats-strip{position:relative;z-index:1;background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.stats-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);}
.stat-item{padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:4px;border-right:1px solid var(--border);transition:background var(--tr);cursor:default;}
.stat-item:last-child{border-right:none;}
.stat-item:hover{background:var(--asoft);}
.stat-emoji{font-size:1.2rem;margin-bottom:6px;}
.stat-val{font-family:var(--font-display);font-weight:900;font-size:1.6rem;letter-spacing:-.04em;color:var(--text);}
.stat-lbl{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}

/* AD WRAP */
.ad-wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:20px 28px;}
.ad-label{font-family:var(--font-mono);font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:.5;text-align:center;margin-bottom:6px;}

/* SECTIONS */
.section{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:72px 28px 100px;}
.sec-hd{display:flex;align-items:center;gap:14px;margin-bottom:48px;}
.sec-pip{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--glow);flex-shrink:0;}
.sec-idx{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);}
.sec-ttl{font-family:var(--font-display);font-weight:800;font-size:clamp(1.6rem,3.5vw,2.4rem);letter-spacing:-.04em;color:var(--text);}

/* PRODUCT CARDS */
.pgrid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(min(100%,260px),1fr));}
.pcard{position:relative;overflow:hidden;background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);border:1px solid var(--border);border-radius:20px;padding:28px;min-height:260px;display:flex;flex-direction:column;justify-content:space-between;text-decoration:none;color:inherit;transition:border-color var(--tr),box-shadow var(--tr),transform .38s var(--ease-spring);will-change:transform;}
.pcard::before{content:'';position:absolute;inset:0;border-radius:20px;background:radial-gradient(circle at top left,var(--ca,transparent),transparent 55%);opacity:0;transition:opacity .4s;pointer-events:none;}
.pcard:hover{border-color:var(--bfocus);box-shadow:var(--smenu);transform:translateY(-6px) scale(1.01);}
.pcard:hover::before{opacity:1;}
.pcard.feat{grid-column:span 2;}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.pc-badge{font-family:var(--font-mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);background:var(--asoft);border:1px solid var(--border);padding:4px 11px;border-radius:99px;}
.pc-emoji{font-size:1.3rem;line-height:1;}
.pc-arr{font-size:.95rem;color:var(--muted);transition:transform .3s var(--ease-spring),color var(--tr);}
.pcard:hover .pc-arr{transform:translate(5px,-5px);color:var(--accent);}
.pc-name{font-family:var(--font-display);font-weight:800;font-size:clamp(1.8rem,4vw,2.4rem);letter-spacing:-.05em;line-height:1;margin-bottom:10px;}
.pc-desc{font-size:.82rem;color:var(--muted);line-height:1.7;margin-bottom:16px;}
.pc-foot{display:flex;justify-content:space-between;align-items:center;}
.pc-tag{font-family:var(--font-mono);font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);opacity:.8;}
.pc-url{font-family:var(--font-mono);font-size:.56rem;letter-spacing:.08em;color:var(--muted);}
.pc-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ac,var(--accent));transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease-spring);opacity:.7;}
.pcard:hover .pc-bar{transform:scaleX(1);}
.ss-wrap{position:absolute;bottom:52px;right:20px;width:180px;height:120px;border-radius:12px;border:1px solid var(--border);overflow:hidden;opacity:0;transform:translateY(8px) scale(.95);transition:opacity .35s,transform .35s var(--ease-spring);background:var(--panel);pointer-events:none;z-index:2;}
.pcard:hover .ss-wrap[data-state="done"]{opacity:1;transform:translateY(0) scale(1);}
.ss-skeleton{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:8px;}
.sk-dot{width:6px;height:6px;border-radius:50%;background:var(--border);animation:skPulse 1.2s ease-in-out infinite;}
.sk-dot:nth-child(2){animation-delay:.2s;}.sk-dot:nth-child(3){animation-delay:.4s;}
@keyframes skPulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
.ss-skeleton.hide{display:none;}
.ss-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;}
.ss-img.loaded{opacity:1;}
.ss-fade{position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(to bottom,transparent 60%,var(--panel));}

/* FEATURES */
.feat-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));}
.feat-card{background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);border:1px solid var(--border);border-radius:16px;padding:28px;transition:border-color var(--tr),box-shadow var(--tr),transform .35s var(--ease-spring);}
.feat-card:hover{border-color:var(--bfocus);box-shadow:var(--shadow);transform:translateY(-3px);}
.feat-em{font-size:1.6rem;display:block;margin-bottom:16px;transition:transform .3s var(--ease-spring);}
.feat-card:hover .feat-em{transform:scale(1.15) rotate(-5deg);}
.feat-ttl{font-family:var(--font-display);font-weight:800;font-size:.95rem;letter-spacing:-.03em;color:var(--text);margin-bottom:8px;}
.feat-body{font-size:.82rem;color:var(--muted);line-height:1.7;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(32px) scale(.98);transition:opacity .7s var(--ease-spring),transform .7s var(--ease-spring);}
.reveal.visible{opacity:1;transform:translateY(0) scale(1);}
.divider{position:relative;z-index:1;height:1px;background:var(--sep);max-width:1100px;margin:0 auto;}

/* FOOTER */
.footer{position:relative;z-index:1;background:var(--panel);backdrop-filter:var(--pblur);-webkit-backdrop-filter:var(--pblur);border-top:1px solid var(--border);padding:56px 28px 40px;}
.footer-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:40px;}
.f-brand-name{font-family:var(--font-display);font-weight:900;font-size:1.4rem;letter-spacing:-.04em;color:var(--text);margin-bottom:8px;}
.f-brand-name .fa{color:var(--accent);}
.f-desc{font-size:.8rem;color:var(--muted);line-height:1.7;max-width:260px;margin-bottom:20px;}
.f-founder-txt{font-size:.75rem;color:var(--sub);line-height:1.6;}
.f-col-ttl{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.f-col ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.f-col li a{font-size:.8rem;color:var(--sub);text-decoration:none;transition:color var(--tr);}
.f-col li a:hover{color:var(--accent);}
.footer-bottom{max-width:1100px;margin:32px auto 0;border-top:1px solid var(--sep);padding-top:24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.f-copy{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.1em;color:var(--muted);}
.f-legal{display:flex;gap:16px;}
.f-legal a{font-size:.7rem;color:var(--muted);text-decoration:none;transition:color var(--tr);}
.f-legal a:hover{color:var(--accent);}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);z-index:999;font-family:var(--font-mono);font-size:.65rem;letter-spacing:.1em;color:var(--sub);background:var(--panel);backdrop-filter:var(--pblur);border:1px solid var(--border);border-radius:99px;padding:9px 22px;box-shadow:var(--shadow);opacity:0;transition:opacity .3s,transform .3s var(--ease-spring);white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* PWA INSTALL BANNER */
#pwa-install-banner{position:fixed;bottom:0;left:0;right:0;z-index:1000;padding:16px 20px calc(16px + env(safe-area-inset-bottom));background:var(--hbg);backdrop-filter:var(--hblur);-webkit-backdrop-filter:var(--hblur);border-top:1px solid var(--border);box-shadow:0 -8px 32px rgba(0,0,0,.12);display:flex;align-items:center;gap:14px;transform:translateY(100%);transition:transform .4s var(--ease-spring);will-change:transform;}
#pwa-install-banner.show{transform:translateY(0);}
#pwa-install-banner.hide{transform:translateY(110%);}
.pwa-icon{width:44px;height:44px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem;}
.pwa-text{flex:1;min-width:0;}
.pwa-text strong{display:block;font-family:var(--font-display);font-size:.78rem;font-weight:800;letter-spacing:-.02em;color:var(--text);}
.pwa-text span{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.08em;color:var(--muted);}
.pwa-actions{display:flex;gap:8px;flex-shrink:0;}
.pwa-btn-install{font-size:.72rem;font-weight:700;letter-spacing:.03em;color:var(--hbg);background:var(--accent);border:none;padding:10px 18px;border-radius:99px;cursor:pointer;transition:transform .2s,filter .2s;white-space:nowrap;}
.pwa-btn-install:hover{transform:scale(1.04);filter:brightness(1.08);}
.pwa-btn-dismiss{font-size:.72rem;font-weight:600;color:var(--muted);background:var(--asoft);border:1px solid var(--border);padding:10px 14px;border-radius:99px;cursor:pointer;transition:color .2s,background .2s;}
.pwa-btn-dismiss:hover{color:var(--text);}

/* Safe area padding for nav and body */
body{padding-top:env(safe-area-inset-top);}
.nav{top:env(safe-area-inset-top);}
@supports(padding-top:constant(safe-area-inset-top)){
  body{padding-top:constant(safe-area-inset-top);}
  .nav{top:constant(safe-area-inset-top);}
}

@media(max-width:900px){.footer-inner{grid-template-columns:1fr 1fr;}.pcard.feat{grid-column:span 1;}.stats-inner{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.nav-links,.nav-cta{display:none;}.nav-ham{display:flex;}.footer-inner{grid-template-columns:1fr;}.stats-inner{grid-template-columns:repeat(2,1fr);}.footer-bottom{flex-direction:column;gap:12px;text-align:center;}}
</style>

  <div class="pwa-actions">
    <button class="pwa-btn-dismiss" id="pwa-dismiss" aria-label="Dismiss install prompt">✕</button>
    <button class="pwa-btn-install" id="pwa-install" aria-label="Install Cobinar app">Install</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const C=COBINAR_CONFIG,B=C.brand;
  const $=id=>document.getElementById(id);
  let curLang=localStorage.getItem('cobinar-lang')||'ht';

  function hexRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `${r},${g},${b}`;}
  function host(u){try{return new URL(u).hostname;}catch{return u;}}

  /* ── Theme + Icon Switcher ──────────────────────────────────── */
  const THEME_CFG = {
    sky:    { meta:'#a8d8ff', icon:'black', label:'Sky'    },
    sakura: { meta:'#ffb8d8', icon:'black', label:'Sakura' },
    mint:   { meta:'#90ddb0', icon:'black', label:'Mint'   },
    white:  { meta:'#ffffff', icon:'black', label:'White'  },
    dark:   { meta:'#000000', icon:'white', label:'Dark'   },
  };

  function applyTheme(t){
    const cfg = THEME_CFG[t] || THEME_CFG.sky;
    document.documentElement.setAttribute('data-theme', t);

    /* Meta theme-color — syncs Android system nav bar + status bar */
    const mt=$('metaTheme');
    if(mt) mt.content = cfg.meta;
    /* Also update any existing theme-color meta for broader support */
    document.querySelectorAll('meta[name="theme-color"]').forEach(m=>m.content=cfg.meta);

    /* Favicon / icon switching */
    const ic = cfg.icon; // 'black' | 'white'
    const f16=$('favicon16'),f48=$('favicon48'),f64=$('favicon64'),fi=$('touchIcon');
    if(f16) f16.href = `icons/${ic}-icon-16.png`;
    if(f48) f48.href = `icons/${ic}-icon-48.png`;
    if(f64) f64.href = `icons/${ic}-icon-64.png`;
    if(fi)  fi.href  = `icons/${ic}-icon-180.png`;

    /* Notify SW for cross-tab sync */
    if(navigator.serviceWorker?.controller){
      navigator.serviceWorker.controller.postMessage({
        type:'THEME_CHANGE', theme: ic==='white'?'dark':'light'
      });
    }

    /* Active pill highlight */
    document.querySelectorAll('.t-pill').forEach(p=>p.classList.toggle('active',p.dataset.t===t));
    localStorage.setItem('cobinar-theme', t);
  }

  /* Lang */
  function applyLang(code){
    curLang=code;localStorage.setItem('cobinar-lang',code);
    document.documentElement.lang=code;
    const L=LANGS[code]||LANGS.ht;
    $('langFlag').textContent=L.flag;
    $('langCode').textContent=code.toUpperCase();
    $('navCta').textContent=L.launchBtn;
    $('navCta').href=C.cta.primary.href;
    $('heroBadge').innerHTML=`<div class="badge-dot"></div>${B.org} — ${L.live}`;
    /* title shimmer */
    const tp=B.name.split(''),as=B.name.length-2;let th='';
    tp.forEach((c,i)=>{if(i===0)th+=`<span class="ht-word">`;if(i===as)th+=`</span><span class="ht-accent">`;th+=c;});th+='</span>';
    $('heroTitle').innerHTML=th;
    $('heroTagline').textContent=L.tagline;
    $('heroFounder').innerHTML=L.foundedBy+' <em>'+B.founder+'</em>';
    $('heroSub').textContent=L.subtitle;
    $('heroCta').innerHTML=`<a href="${C.cta.primary.href}" class="btn-primary">${L.launchBtn}</a><a href="${C.cta.secondary.href}" class="btn-ghost">${L.docsBtn}</a>`;
    $('scrollHintTxt').textContent=L.scrollHint;
    /* stat labels */
    document.querySelectorAll('.stat-lbl').forEach((el,i)=>{if(L.statLbls[i])el.textContent=L.statLbls[i];});
    /* section titles */
    if($('sec01ttl'))$('sec01ttl').textContent=L.s01;
    if($('sec02ttl'))$('sec02ttl').textContent=L.s02;
    /* feat cards */
    document.querySelectorAll('.feat-ttl').forEach((el,i)=>{if(L.featCards[i])el.textContent=L.featCards[i].ttl;});
    document.querySelectorAll('.feat-body').forEach((el,i)=>{if(L.featCards[i])el.textContent=L.featCards[i].body;});
    /* footer */
    $('footerTop').innerHTML=`
      <div>
        <div class="f-brand-name">${B.name.slice(0,-2)}<span class="fa">${B.name.slice(-2)}</span></div>
        <p class="f-desc">${L.subtitle}</p>
        <div class="f-founder-txt">${L.fBy}<br><strong>${B.founder}</strong><br>${B.org}</div>
      </div>
      <div class="f-col"><p class="f-col-ttl">${L.fPlatform}</p><ul>${C.products.map(p=>`<li><a href="${p.url}" target="_blank" rel="noopener">${p.name}</a></li>`).join('')}</ul></div>
      <div class="f-col"><p class="f-col-ttl">${L.fCompany}</p><ul>
        <li><a href="about.html">${L.fAbout}</a></li>
        <li><a href="https://blog.cobinar.com">${L.fBlog}</a></li>
        <li><a href="https://docs.cobinar.com">Docs</a></li>
        <li><a href="https://help.cobinar.com">${L.fHelp}</a></li>
      </ul></div>
      <div class="f-col"><p class="f-col-ttl">${L.fLegal}</p><ul>
        <li><a href="privacy.html">${L.fPrivacy}</a></li>
        <li><a href="terms.html">${L.fTerms}</a></li>
        <li><a href="cookies.html">${L.fCookies}</a></li>
      </ul></div>`;
    $('fCopy').textContent='© '+(B.copyright||new Date().getFullYear())+' '+B.org+'. '+L.copyright;
    $('fLegal').innerHTML='';
    [{l:L.fPrivacy,h:'privacy.html'},{l:L.fTerms,h:'terms.html'},{l:L.fAbout,h:'about.html'}].forEach(x=>{const a=document.createElement('a');a.href=x.h;a.textContent=x.l;$('fLegal').appendChild(a);});
    /* dropdown active */
    document.querySelectorAll('.lang-opt').forEach(o=>o.classList.toggle('active',o.dataset.lang===code));
    /* RTL for Arabic */
    document.documentElement.dir=code==='ar'?'rtl':'ltr';
  }

  /* Build lang dropdown */
  const dd=$('langDropdown');
  Object.values(LANGS).forEach(l=>{
    const opt=document.createElement('div');
    opt.className='lang-opt';opt.dataset.lang=l.code;
    opt.innerHTML=`<span class="lo-flag">${l.flag}</span><span class="lo-name">${l.name}</span><span class="lo-check">✓</span>`;
    opt.addEventListener('click',()=>{applyLang(l.code);dd.classList.remove('open');$('langBtn').setAttribute('aria-expanded','false');});
    dd.appendChild(opt);
  });
  $('langBtn').addEventListener('click',e=>{e.stopPropagation();const open=dd.classList.toggle('open');$('langBtn').setAttribute('aria-expanded',String(open));});
  document.addEventListener('click',()=>{dd.classList.remove('open');$('langBtn').setAttribute('aria-expanded','false');});
  dd.addEventListener('click',e=>e.stopPropagation());

  /* ── Service Worker Registration ──────────────────────────── */
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('/sw.js',{scope:'/'})
        .then(reg=>{
          console.log('[Cobinar] SW registered:',reg.scope);
          setInterval(()=>reg.update(),60000);
          reg.addEventListener('updatefound',()=>{
            const nw=reg.installing;
            nw?.addEventListener('statechange',()=>{
              if(nw.state==='installed'&&navigator.serviceWorker.controller)
                showToast('✦ Update available — reload to apply');
            });
          });
        })
        .catch(e=>console.warn('[Cobinar] SW failed:',e));

      /* Listen for SW → ICON_UPDATE cross-tab messages */
      navigator.serviceWorker.addEventListener('message',event=>{
        if(event.data?.type==='ICON_UPDATE'){
          const ic=event.data.theme==='dark'?'white':'black';
          const f16=$('favicon16'),f48=$('favicon48'),f64=$('favicon64'),fi=$('touchIcon');
          if(f16)f16.href=`icons/${ic}-icon-16.png`;
          if(f48)f48.href=`icons/${ic}-icon-48.png`;
          if(f64)f64.href=`icons/${ic}-icon-64.png`;
          if(fi) fi.href =`icons/${ic}-icon-180.png`;
        }
      });
    });
  }

  /* ── OS dark mode → auto-init icon (respects saved theme) ── */
  (function initOsIcons(){
    const saved=localStorage.getItem('cobinar-theme');
    if(saved) return; // already set by user — respect their choice
    const osDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
    if(osDark) applyTheme('dark');
  })();

  /* Nav */
  $('navLogo').innerHTML='<div class="logo-pip"></div>'+B.name;
  (C.nav||[]).forEach(l=>{const li=document.createElement('li');li.innerHTML=`<a href="${l.href}">${l.label}</a>`;$('navLinks').appendChild(li);const a=document.createElement('a');a.href=l.href;a.textContent=l.label;$('navDrawer').appendChild(a);});

  /* Theme switcher pills */
  [
    {id:'sky',    bg:'#5ba8e0', label:'☁️ Sky'},
    {id:'sakura', bg:'#f8b8d8', label:'🌸 Sakura'},
    {id:'mint',   bg:'#90e8c0', label:'🌿 Mint'},
    {id:'white',  bg:'#ffffff', label:'⬜ White'},
    {id:'dark',   bg:'#000000', label:'⬛ Dark'},
  ].forEach(t=>{
    const b=document.createElement('button');
    b.className='t-pill';b.title=t.label;b.dataset.t=t.id;
    b.style.background=t.bg;
    if(t.id==='dark') b.style.boxShadow='inset 0 0 0 1.5px rgba(255,255,255,0.30)';
    if(t.id==='white') b.style.boxShadow='inset 0 0 0 1.5px rgba(0,0,0,0.18)';
    b.addEventListener('click',()=>applyTheme(t.id));
    $('themeSwitcher').appendChild(b);
  });
  applyTheme(localStorage.getItem('cobinar-theme')||C.defaultTheme||'sky');

  /* Hamburger */
  let dOpen=false;
  $('navHam').addEventListener('click',()=>{dOpen=!dOpen;$('navDrawer').classList.toggle('open',dOpen);});
  $('navDrawer').querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{dOpen=false;$('navDrawer').classList.remove('open');}));

  /* Stats (skeleton, labels filled by applyLang) */
  C.stats.forEach(s=>{const d=document.createElement('div');d.className='stat-item reveal';d.innerHTML=`<span class="stat-emoji">${s.emoji}</span><span class="stat-val">${s.value}</span><span class="stat-lbl">${s.label}</span>`;$('statsGrid').appendChild(d);});

  /* Products */
  const isMobile=window.innerWidth<=640;
  C.products.forEach(p=>{
    const rgb=hexRgb(p.accent);const isFeat=p.featured&&!isMobile;
    const card=document.createElement('a');card.href=p.url;card.target='_blank';card.rel='noopener noreferrer';
    card.className='pcard reveal'+(isFeat?' feat':'');
    card.style.cssText=`--ca:rgba(${rgb},.09);--ac:${p.accent};`;
    card.innerHTML=`<div><div class="pc-top"><span class="pc-badge">${p.category}</span><span class="pc-emoji">${p.emoji||'✦'}</span><span class="pc-arr" aria-hidden="true">↗</span></div><h3 class="pc-name" style="color:${p.accent}">${p.name}</h3><p class="pc-desc">${p.description}</p></div><div class="pc-foot"><span class="pc-tag">${p.tag||''}</span><span class="pc-url">${host(p.url)}</span></div><div class="pc-bar"></div><div class="ss-wrap" data-state="idle"><div class="ss-fade"></div><div class="ss-skeleton"><div class="sk-dot"></div><div class="sk-dot"></div><div class="sk-dot"></div></div><img class="ss-img" src="" alt="" loading="lazy"/></div>`;
    $('productsGrid').appendChild(card);
    if(!isMobile){let t=null;card.addEventListener('mouseenter',()=>{const ss=card.querySelector('.ss-wrap');if(!ss||ss.dataset.state!=='idle')return;t=setTimeout(()=>{ss.dataset.state='loading';const img=ss.querySelector('.ss-img'),sk=ss.querySelector('.ss-skeleton');img.src=`https://api.microlink.io/?url=${encodeURIComponent(p.url)}&screenshot=true&meta=false&embed=screenshot.url`;img.onload=()=>{img.classList.add('loaded');sk.classList.add('hide');ss.dataset.state='done';};img.onerror=()=>{sk.classList.add('hide');ss.dataset.state='error';};},320);});card.addEventListener('mouseleave',()=>clearTimeout(t));}
  });

  /* Feature card skeletons (text filled by applyLang) */
  ['◈','🌐','⚡','✦','◎','♡'].forEach(em=>{
    const d=document.createElement('div');d.className='feat-card reveal';
    d.innerHTML=`<span class="feat-em">${em}</span><h3 class="feat-ttl"></h3><p class="feat-body"></p>`;
    $('featGrid').appendChild(d);
  });

  /* Apply default lang */
  applyLang(curLang);

  /* Nav scroll */
  const nav=$('nav');
  window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>30),{passive:true});

  /* Progress bar */
  const pb=$('progressBar');
  window.addEventListener('scroll',()=>{const max=document.body.scrollHeight-window.innerHeight;pb.style.width=(window.scrollY/max*100)+'%';},{passive:true});

  /* Parallax */
  const orbs=[{el:$('orb1'),s:.08},{el:$('orb2'),s:-.12},{el:$('orb3'),s:.05},{el:$('orb4'),s:-.07}];
  window.addEventListener('scroll',()=>{const y=window.scrollY;orbs.forEach(o=>{if(o.el)o.el.style.transform=`translateY(${y*o.s}px)`;});},{passive:true});

  /* Hero parallax */
  const heroEl=$('hero'),heroTitleEl=$('heroTitle'),heroSubEl=$('heroSub');
  window.addEventListener('scroll',()=>{const y=window.scrollY;if(y<window.innerHeight){heroTitleEl.style.transform=`translateY(${y*.22}px)`;heroSubEl.style.transform=`translateY(${y*.14}px)`;heroEl.style.opacity=1-(y/(window.innerHeight*.7));}},{passive:true});

  /* Reveal */
  const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(!e.isIntersecting)return;setTimeout(()=>e.target.classList.add('visible'),Number(e.target.dataset.d||0));io.unobserve(e.target);});},{threshold:.07});
  document.querySelectorAll('.reveal').forEach((el,i)=>{el.dataset.d=i*65;io.observe(el);});

  /* Toast */
  const toast=$('toast');let toastT;
  function showToast(m,d=2400){toast.textContent=m;toast.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toast.classList.remove('show'),d);}
  setTimeout(()=>showToast((LANGS[curLang]||LANGS.ht).toast),700);

  document.title=B.name+' — '+(LANGS[curLang]||LANGS.ht).tagline;

  /* ── PWA Install Banner ────────────────────────────────────── */
  (function initPWAInstall(){
    const banner=$('pwa-install-banner');
    const btnInstall=$('pwa-install');
    const btnDismiss=$('pwa-dismiss');
    if(!banner||!btnInstall||!btnDismiss) return;

    let deferredPrompt=null;
    const DISMISSED_KEY='cobinar-pwa-dismissed';
    const hasDismissed=!!localStorage.getItem(DISMISSED_KEY);

    // Hide entirely if already installed (standalone mode)
    const isStandalone=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone===true;
    if(isStandalone||hasDismissed){banner.style.display='none';return;}

    // Fallback: show banner after 1.5s for iOS/unsupported browsers
    let startupTimer=setTimeout(()=>{banner.classList.add('show');},1500);

    // Native prompt event (Chrome/Android)
    window.addEventListener('beforeinstallprompt',e=>{
      e.preventDefault();
      deferredPrompt=e;
      clearTimeout(startupTimer);
      setTimeout(()=>banner.classList.add('show'),1500);
    });

    btnInstall.addEventListener('click',async()=>{
      banner.classList.remove('show');
      if(deferredPrompt){
        deferredPrompt.prompt();
        const{outcome}=await deferredPrompt.userChoice;
        deferredPrompt=null;
        if(outcome==='accepted') showToast('✦ Cobinar installed!');
      } else {
        // iOS guide
        showToast('✦ Tap Share → "Add to Home Screen"',4200);
      }
    });

    btnDismiss.addEventListener('click',()=>{
      banner.classList.remove('show');
      localStorage.setItem(DISMISSED_KEY,'1');
    });

    window.addEventListener('appinstalled',()=>{
      banner.classList.remove('show');
      banner.style.display='none';
      showToast('✦ Cobinar installed!');
    });
  })();

})();
</script>
</body>
</html>
